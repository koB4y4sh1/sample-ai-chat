name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.2"
          enable-cache: false

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint and type check
        run: pnpm run check

      - name: Debug agent-framework __init__
        run: |
          uv run python - <<'PY'
          import agent_framework
          from pathlib import Path

          path = Path(agent_framework.__file__)
          print("agent_framework file:", path)
          print("contains MCPStreamableHTTPTool:", "MCPStreamableHTTPTool" in path.read_text(encoding="utf-8"))
          print("contains SupportsAgentRun:", "SupportsAgentRun" in path.read_text(encoding="utf-8"))
          print("--- head ---")
          print("\n".join(path.read_text(encoding="utf-8").splitlines()[:80]))
          PY

      - name: Debug installed dist
        run: |
          uv run python - <<'PY'
          import importlib.metadata as m

          dist = m.distribution("agent-framework")
          print("version:", dist.version)
          print("location:", dist.locate_file(""))
          print("files:")
          for f in dist.files or []:
              s = str(f)
              if s.endswith("agent_framework/__init__.py") or s.endswith("agent_framework/_mcp.py") or s.endswith("RECORD"):
                  print(s)
          PY

      - name: Check uv lock is up to date
        run: uv lock --check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.2"
          enable-cache: false

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Run pre-commit
        env:
          SKIP: uv-lock
        run: uv run pre-commit run --all-files

      - name: Check uv lock is up to date
        run: uv lock --check
