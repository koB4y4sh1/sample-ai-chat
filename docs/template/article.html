<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #20242a;
        --muted: #5b6470;
        --line: #d8dde3;
        --accent: #1864ab;
        --code: #eef2f6;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.65;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 40px 24px 64px;
      }

      header {
        border-bottom: 1px solid var(--line);
        margin-bottom: 32px;
        padding-bottom: 24px;
      }

      h1,
      h2,
      h3 {
        line-height: 1.25;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      h2 {
        border-bottom: 1px solid var(--line);
        margin-top: 40px;
        padding-bottom: 8px;
        font-size: 1.35rem;
      }

      h3 {
        margin-top: 24px;
        font-size: 1.05rem;
      }

      p,
      li {
        color: var(--muted);
      }

      code,
      pre {
        font-family:
          "SFMono-Regular",
          Consolas,
          "Liberation Mono",
          monospace;
      }

      code {
        border-radius: 4px;
        background: var(--code);
        padding: 0.1em 0.35em;
        color: var(--text);
      }

      pre {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 16px;
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
      }

      th,
      td {
        border: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f6;
        color: var(--text);
      }

      .note {
        border-left: 4px solid var(--accent);
        background: var(--panel);
        padding: 12px 16px;
      }

      a {
        color: var(--accent);
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      {{BODY}}
    </main>
  </body>
</html>
