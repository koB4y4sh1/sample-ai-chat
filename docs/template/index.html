<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: rgba(255, 255, 255, 0.86);
        --text: #1d2521;
        --muted: #57655d;
        --line: rgba(39, 65, 54, 0.12);
        --accent: #1e6f5c;
        --accent-strong: #124437;
        --hero: linear-gradient(135deg, #efe3c3 0%, #d6eadf 55%, #ecf5f2 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(250, 211, 115, 0.25), transparent 28%),
          radial-gradient(circle at right 20%, rgba(52, 211, 153, 0.18), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: Georgia, "Yu Mincho", "Hiragino Mincho ProN", serif;
        line-height: 1.7;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 24px 72px;
      }

      .hero {
        padding: 36px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--hero);
        box-shadow: 0 22px 50px rgba(34, 57, 48, 0.09);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.84rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1,
      h2,
      h3 {
        line-height: 1.2;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 4.2rem);
      }

      h2 {
        margin: 40px 0 18px;
        font-size: 1.55rem;
      }

      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-top: 40px;
      }

      .section-header h2 {
        margin: 0;
      }

      .section-kicker {
        margin: 0;
        font-size: 0.9rem;
        color: var(--accent-strong);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      p,
      li {
        color: var(--muted);
      }

      .lead {
        max-width: 760px;
        font-size: 1.08rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 18px;
        margin-top: 28px;
      }

      .category {
        margin-top: 28px;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 18px 40px rgba(43, 59, 51, 0.06);
      }

      .card h3 {
        margin: 0;
        font-size: 1.18rem;
      }

      .tag {
        width: fit-content;
        padding: 0.18rem 0.6rem;
        border-radius: 999px;
        background: rgba(30, 111, 92, 0.1);
        color: var(--accent-strong);
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      a {
        color: var(--accent-strong);
      }

      .footer-note {
        margin-top: 36px;
        padding: 18px 20px;
        border-left: 4px solid var(--accent);
        background: rgba(255, 255, 255, 0.72);
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      @media (max-width: 720px) {
        main {
          padding: 24px 16px 56px;
        }

        .hero {
          padding: 28px 22px;
          border-radius: 22px;
        }

        .card {
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{BODY}}
    </main>
  </body>
</html>
